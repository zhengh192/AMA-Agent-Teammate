id: trend_anomaly_analysis
name: Trend and Anomaly Analysis
version: 1.0.0
status: active
description: Evaluate bounded metric trends and flag simple change or anomaly candidates.
owner: Data Analysis Platform
reviewer: Data Governance
created_at: 2026-07-15T00:00:00Z
updated_at: 2026-07-15T00:00:00Z
effective_from: 2026-07-15
effective_to: null
aliases: [trend analysis, anomaly detection, 趋势分析, 异常检测]
trigger_examples:
  en: [Show the trend, Find unusual changes]
  zh: [查看趋势, 找异常波动]
analysis_intents: [trend, anomaly, seasonality]
required_metadata: [metric, dataset, field, business_rule]
prerequisite_skills: [data_quality_check]
inputs:
  - {name: time_series, type: dataset, required: true, description: Ordered bounded metric series.}
outputs:
  - {name: trend_evidence, type: evidence, description: Trend and simple anomaly candidates with thresholds.}
  - {name: trend_chart, type: chart, description: Line chart when it improves understanding.}
required_tools: [controlled_analysis_library, plotly_validator]
deterministic_operations: [relative_change, z_score_candidate, small_sample_warning]
