schema_version: 1
kind: metric_file
definitions:
  - kind: metric
    id: air.case_conversion_rate
    version: 1.0.0
    status: active
    name: AIR Case Conversion Rate
    description: Share of eligible AIR visits that produce an attributable non-cancelled case within seven days.
    owner: AIR Product Analytics
    source: AIR metric owner approval record
    effective_from: 2026-01-01
    effective_to: null
    last_reviewed_at: 2026-07-15
    aliases: [visit to case conversion, AIR visit conversion]
    numerator:
      expression: COUNT(DISTINCT case_id)
      description: Attributable non-cancelled cases created within seven days of a visit.
      aggregation: count_distinct
      distinct_by: [air.case_log.case_id]
      field_references: [air.case_log.case_id, air.case_log.origin_visit_id, air.case_log.status]
    denominator:
      expression: COUNT(DISTINCT visit_id)
      description: Eligible AIR visits in the reporting period.
      aggregation: count_distinct
      distinct_by: [air.visit_log.visit_id]
      field_references: [air.visit_log.visit_id]
    formula: eligible attributable cases / eligible AIR visits
    distinct_logic: Count each visit and each case once; multiple cases for one visit remain multiple numerator cases pending owner policy.
    filters: [case is created from zero through seven days after the visit, case status is not cancelled]
    exclusions: [visits outside the requested interval, cases without an origin visit ID]
    time_logic:
      event_time_field: air.visit_log.visited_at
      timezone: UTC
      window: Visit cohort by [start_date, end_date) with a seven-day case attribution window
      late_arrival_policy: Recompute the most recent nine days to cover visit and case arrival lag.
    supported_dimensions: [air.visit_log.visited_at, air.case_log.status]
    source_datasets: [air.visit_log, air.case_log]
    interpretation_cautions: [Cross-database unmatched visits reduce attribution completeness., Conversion is descriptive and does not establish that AIR caused case creation.]
    business_rule_ids: [air.case_attribution_window]
