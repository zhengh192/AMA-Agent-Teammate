    name: Case Creation Rate
    description: Share of eligible serial-number rows that have an eTicket case number.
    aliases: [case_creation_rate, case create rate]
    numerator: {expression: SUM(CASE WHEN eticket_case_number IS NOT NULL THEN 1 ELSE 0 END), description: Rows with an eTicket case number., aggregation: sum, distinct_by: [], field_references: [super_agent_uat.visit_log.eticket_case_number]}
    denominator: {expression: SUM(CASE WHEN serial_number IS NOT NULL AND (pd_triggered = 'yes' OR is_cid = '1') THEN 1 ELSE 0 END), description: Rows with a serial number that are PD-triggered or CID., aggregation: sum, distinct_by: [], field_references: [super_agent_uat.visit_log.serial_number, super_agent_uat.visit_log.pd_triggered, super_agent_uat.visit_log.is_cid]}
    formula: case rows / eligible serial-number rows
    interpretation_cautions: [Identifiers are aggregate-only and never returned as raw values., A null or zero denominator returns Unknown.]
