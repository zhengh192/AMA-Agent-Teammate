    distinct_logic: visit_log is session grain; count each non-null session_id row exactly once without additional deduplication.
    filters: [start_time is inside the approved half-open interval]
    exclusions: [rows with null session_id, rows outside the requested time interval]
    time_logic: {event_time_field: super_agent_uat.visit_log.start_time, timezone: Unknown, window: 'Half-open interval [start_date, end_date)', late_arrival_policy: Unknown}
    supported_dimensions: [super_agent_uat.visit_log.start_time, super_agent_uat.visit_log.channel, super_agent_uat.visit_log.intent_type]
    source_datasets: [super_agent_uat.visit_log]
    business_rule_ids: []
    id: super_agent_uat.cid_session_rate
    name: CID Session Rate
    description: Share of observed visit_log sessions classified as CID, meaning the customer self-resolved the case.
    aliases: [CID share, CID session share, CID占比, CID session占比, is_cid rate, is_cid比例]
    numerator: {expression: "SUM(CASE WHEN is_cid = '1' THEN 1 ELSE 0 END)", description: Session rows classified as CID., aggregation: sum, distinct_by: [], field_references: [super_agent_uat.visit_log.is_cid]}
    denominator: {expression: SUM(CASE WHEN session_id IS NOT NULL THEN 1 ELSE 0 END), description: All observed non-null session rows., aggregation: sum, distinct_by: [], field_references: [super_agent_uat.visit_log.session_id]}
    formula: CID session rows / all non-null session rows
    interpretation_cautions: [Logical true maps to the physical string value '1' in UAT., A null or zero denominator returns Unknown., No channel filter is implied unless the user requests one.]
