    id: super_agent_uat.whtr
    name: WHTR
    description: Working-hours transfer rate at visit_log row grain.
    aliases: [working hours transfer rate, working hour transfer rate, 转人工率, 工作时间转人工率]
    numerator: {expression: SUM(CASE WHEN to_agent_flag = TRUE AND agent_working_hour = TRUE THEN 1 ELSE 0 END), description: Working-hour rows transferred to an agent., aggregation: sum, distinct_by: [], field_references: [super_agent_uat.visit_log.to_agent_flag, super_agent_uat.visit_log.agent_working_hour]}
    denominator: {expression: SUM(CASE WHEN agent_working_hour = TRUE THEN 1 ELSE 0 END), description: All working-hour rows., aggregation: sum, distinct_by: [], field_references: [super_agent_uat.visit_log.agent_working_hour]}
    formula: transfer_volume / wh_volume
    interpretation_cautions: [Boolean-compatible field representation should be checked if source encoding changes., A null or zero denominator returns Unknown.]
