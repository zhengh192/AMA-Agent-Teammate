schema_version: 1
kind: business_rule_file
definitions:
  - kind: business_rule
    id: demo.readonly_bounded_results
    version: 1.0.0
    status: active
    name: Demo Read-Only Bounded Results
    description: Security rule applied to all demo analytical queries.
    owner: Enterprise Security
    source: Repository security model
    effective_from: 2025-01-01
    effective_to: null
    last_reviewed_at: 2026-07-15
    statement: Queries must be read-only and enforce approved time, row, byte, and timeout bounds.
    expression: SELECT-only query with configured allowlist and runtime caps
    applies_to: [demo.daily_sales, demo.segment_sales, demo.campaigns]
    references: []
    severity: blocking
    caveats: []
  - kind: business_rule
    id: demo.funnel_quality_gate
    version: 1.0.0
    status: active
    name: Funnel Quality Gate
    description: Quality issues must be reported before interpreting conversion rates.
    owner: Operations Analytics
    source: Phase 2 demo quality contract
    effective_from: 2025-01-01
    effective_to: null
    last_reviewed_at: 2026-07-15
    statement: Null numerator or denominator values and duplicate event IDs must be quantified before rate interpretation.
    expression: missing_count and duplicate_event_count are reported
    applies_to: [demo.funnel_events, demo.conversion_rate, demo.funnel_completeness]
    references: []
    severity: warning
    caveats: []
  - {kind: business_rule, id: super_agent.requirement_930_not_implemented, version: 0.9.30, status: draft, name: Version 930 Is Requirements Only, description: Lifecycle guard for version 930 fields and feature telemetry., owner: Super Agent Data and Operations, source: User confirmation and 930 workbook, effective_from: 2026-07-13, effective_to: null, last_reviewed_at: 2026-07-13, statement: Version 930 definitions are not implemented and must not be queried or presented as available data., expression: metadata.status = draft AND physical_schema_verified = false, applies_to: [super_agent.session, super_agent.turn, super_agent.frontend_event], references: [], severity: blocking, caveats: [Activation requires physical schema validation and human approval.]}
  - {kind: business_rule, id: super_agent.downstream_kpi_attribution_caution, version: 0.9.30, status: draft, name: Downstream KPI Attribution Caution, description: Limits causal and ownership claims for downstream FS and commercial KPIs., owner: Super Agent Data and Operations, source: 930 workbook; Overview note and KPI Catalog, effective_from: 2026-07-13, effective_to: null, last_reviewed_at: 2026-07-13, statement: Related FS and commercial KPIs may be influenced by Super Agent but must be observed and attributed carefully rather than treated as fully owned impact., expression: label conclusions as inferred unless an approved attribution design exists, applies_to: [super_agent.rrr, super_agent.npra_rate, super_agent.ppsn, super_agent.gmv], references: [], severity: warning, caveats: [Correlation is not causal evidence.]}
  - {kind: business_rule, id: super_agent.eligibility_definition_required, version: 0.9.30, status: draft, name: Eligibility Definition Required, description: Prevents execution of rates whose eligible population is not approved., owner: Super Agent Data and Operations, source: 930 workbook; KPI Catalog, effective_from: 2026-07-13, effective_to: null, last_reviewed_at: 2026-07-13, statement: Every rate must define its eligible numerator and denominator populations before activation., expression: numerator_eligibility IS NOT NULL AND denominator_eligibility IS NOT NULL, applies_to: [super_agent.whtr, super_agent.touchless_rate, super_agent.partial_touchless_rate, super_agent.foc_rate, super_agent.sa_contact_rate, super_agent.sa_ticket_rate], references: [], severity: blocking, caveats: []}
  - {kind: business_rule, id: super_agent.multi_case_model_open, version: 0.9.30, status: draft, name: Multi-Case Session Model Is Open, description: Records the unresolved one-session-to-multiple-case and serial-number design., owner: Super Agent Data and Operations, source: 930 workbook; Open Questions, effective_from: 2026-07-13, effective_to: null, last_reviewed_at: 2026-07-13, statement: Do not assume one case or one serial number per session; case-grain metrics require a validated one-to-many model., expression: COUNT(case_id per session_id) may be greater than one, applies_to: [super_agent.session, super_agent.case, super_agent.touchless_rate, super_agent.partial_touchless_rate, super_agent.sa_ticket_rate], references: [], severity: blocking, caveats: [The final storage shape and attribution logic are undecided.]}
  - {kind: business_rule, id: super_agent.foc_definition_requires_confirmation, version: 0.9.30, status: draft, name: FOC Definition Requires Confirmation, description: Captures unresolved FOC segmentation and LLM-judgment logic., owner: Service Operations and CX, source: 930 workbook; KPI Catalog and Data - Session is_foc, effective_from: 2026-07-13, effective_to: null, last_reviewed_at: 2026-07-13, statement: FOC cannot be activated until chat versus eTicket treatment and accepted resolution evidence are approved., expression: no case AND no human transfer AND approved resolution evidence, applies_to: [super_agent.foc_rate, super_agent.session.is_foc], references: [], severity: blocking, caveats: [Survey score and LLM judgment are proposed evidence sources.]}
  - {kind: business_rule, id: super_agent.survey_coverage_required, version: 0.9.30, status: draft, name: Survey Coverage Required, description: Prevents unqualified interpretation of survey-based metrics., owner: CX Analytics, source: 930 workbook; KPI Catalog T3B and FCR, effective_from: 2026-07-13, effective_to: null, last_reviewed_at: 2026-07-13, statement: Survey metrics must report response coverage and selection limitations alongside the rate., expression: submitted_surveys / eligible_survey_population is reported, applies_to: [super_agent.t3b_rate, super_agent.fcr], references: [], severity: warning, caveats: [The minimum acceptable coverage threshold is not defined.]}
  - {kind: business_rule, id: super_agent.fcr_repeat_window_required, version: 0.9.30, status: draft, name: FCR Repeat-Contact Window Required, description: Requires a defined repeat-contact window for first-contact resolution., owner: CX Analytics, source: 930 workbook; KPI Catalog FCR remark, effective_from: 2026-07-13, effective_to: null, last_reviewed_at: 2026-07-13, statement: FCR cannot be treated as confirmed first-contact resolution until the repeat-contact window and identity matching are approved., expression: no repeat eligible contact within approved window, applies_to: [super_agent.fcr, super_agent.contacts_per_resolution], references: [], severity: blocking, caveats: []}
  - {kind: business_rule, id: super_agent.resolution_endpoint_required, version: 0.9.30, status: draft, name: Resolution Endpoint Required, description: Requires an approved definition of resolution and journey endpoint., owner: Product and Service Design, source: 930 workbook; KPI Catalog Journey Efficiency, effective_from: 2026-07-13, effective_to: null, last_reviewed_at: 2026-07-13, statement: Time to Resolution and Contacts per Resolution remain unknown until the resolution endpoint and journey-linking window are defined., expression: resolution_endpoint IS NOT NULL AND journey_window IS NOT NULL, applies_to: [super_agent.time_to_resolution, super_agent.contacts_per_resolution], references: [], severity: blocking, caveats: []}
  - {kind: business_rule, id: super_agent.data_platform_open, version: 0.9.30, status: draft, name: Data Platform and Refresh Are Open, description: Records the open database and refresh-frequency decision., owner: Super Agent Data and Operations, source: 930 workbook; Open Questions Database, effective_from: 2026-07-13, effective_to: null, last_reviewed_at: 2026-07-13, statement: Physical database type and refresh design must be approved before implementation; business requires at least hourly refresh., expression: database_type IS NOT NULL AND refresh_frequency <= 1 hour, applies_to: [super_agent.tracking], references: [], severity: blocking, caveats: [Database choice may change tracking requirements and Power BI integration.]}
  - {kind: business_rule, id: super_agent.data_protection_open, version: 0.9.30, status: draft, name: Data Protection Design Is Open, description: Records the unresolved data encryption and protection requirement., owner: Enterprise Security, source: 930 workbook; Open Questions Data Encryption, effective_from: 2026-07-13, effective_to: null, last_reviewed_at: 2026-07-13, statement: "Sensitive user, transcript, shipping, serial-number, and event payload fields require approved encryption, masking, access, and retention controls before ingestion.", expression: protection_policy_approved = true, applies_to: [super_agent.session, super_agent.turn, super_agent.frontend_event, super_agent.case], references: [], severity: blocking, caveats: [The workbook does not contain a concluded encryption design.]}
