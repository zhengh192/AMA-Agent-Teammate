schema_version: 1
kind: data_source_file
definition:
  kind: data_source
  id: super_agent_uat.tracking
  version: 1.0.0
  status: active
  name: Super Agent UAT Tracking
  description: Verified physical UAT tracking tables exposed by the Doris MySQL-compatible endpoint.
  owner: Super Agent Data and Operations
  source: Super Agent UAT catalog verified 2026-07-16
  effective_from: 2026-06-01
  effective_to: null
  last_reviewed_at: 2026-07-16
  platform: mysql
  connection_name: super_agent_uat
  read_only: true
  datasets:
    - kind: dataset
      id: super_agent_uat.visit_log
      version: 1.0.0
      status: active
      name: Super Agent UAT Visit Log
      description: Verified session-grain UAT tracking records.
      owner: Super Agent Data and Operations
      source: UAT information_schema and bounded quality profile
      effective_from: 2026-06-01
      effective_to: null
      last_reviewed_at: 2026-07-16
      data_source_id: super_agent_uat.tracking
      physical_name: visit_log
      schema_name: sa_logs
      grain: One physical record per observed Super Agent session.
      primary_key_fields: [super_agent_uat.visit_log.session_id]
      business_rule_ids: [super_agent.valid_user_traffic_population]
      caveats: [Doris declares every field nullable., Timezone and late-arrival policy are unknown., Development UAT detail reads are permitted only when the encrypted-field policy switch is enabled.]
    - kind: dataset
      id: super_agent_uat.turn_log
      version: 1.0.0
      status: active
      name: Super Agent UAT Turn Log
      description: Verified turn-grain UAT tracking records.
      owner: Super Agent Data and Operations
      source: UAT information_schema and bounded quality profile
      effective_from: 2026-06-01
      effective_to: null
      last_reviewed_at: 2026-07-16
      data_source_id: super_agent_uat.tracking
      physical_name: turn_log
      schema_name: sa_logs
      grain: One physical record per observed interaction turn.
      primary_key_fields: [super_agent_uat.turn_log.turn_id]
      business_rule_ids: [super_agent.valid_user_traffic_population]
      caveats: [Doris declares every field nullable., Transcript and response fields are encrypted or tokenized and may be selected only in bounded approved development UAT queries.]
    - kind: dataset
      id: super_agent_uat.telemetry_log
      version: 1.0.0
      status: active
      name: Super Agent UAT Telemetry Log
      description: Verified frontend telemetry event records.
      owner: Super Agent Product Analytics
      source: UAT information_schema and bounded quality profile
      effective_from: 2026-06-01
      effective_to: null
      last_reviewed_at: 2026-07-16
      data_source_id: super_agent_uat.tracking
      physical_name: telemetry_log
      schema_name: sa_logs
      grain: One physical record per frontend telemetry event.
      primary_key_fields: [super_agent_uat.telemetry_log.event_id]
      business_rule_ids: [super_agent.valid_user_traffic_population]
      caveats: [Event payload data is encrypted or tokenized and may be selected only in bounded approved development UAT queries., Timezone and event taxonomy are not approved.]
